# Held-out eval examples, mirror of domains/security_analyst/examples.yaml
# with the date windows pointing at the eval week. Not visible to the agent.

- id: eval_incidents_01
  capability: detect_security_incidents
  instruction: |
    Review security activity in the auth_logs and network indices between
    2026-04-20T00:00:00Z and 2026-04-23T00:00:00Z (Monday through Wednesday).
    Identify real security incidents present in that window. Do not flag
    activity that matches a documented benign pattern.

    OpenSearch is at http://localhost:9200. Indices: auth_logs, network.

    Return your answer as a JSON list via submit_attempt's `answer` field.
    Each item must be an object:

      {
        "type": "<one of: credential_stuffing | data_exfiltration | lateral_movement | dns_tunneling | other>",
        "primary_indicator": "<IP address, user name, or internal hostname>",
        "evidence": "<one-sentence reason>"
      }

    The `type` value must come from the enumerated set above. If no real
    incidents are present in the window, submit an empty list.
  verification:
    function: verify_incidents

