- id: eval_audit_01
  capability: audit_user_access
  instruction: |
    Between 2026-04-20T00:00:00Z and 2026-04-27T00:00:00Z (the full week),
    list any users who successfully logged in from outside the EU and
    whose activity warrants investigation. Exclude users whose non-EU
    activity is covered by a documented exception.

    Use the auth_logs index at http://localhost:9200.

    Return your answer as a JSON object via submit_attempt's `answer` field:

      {"users_to_investigate": ["<user.name>", ...]}
  verification:
    function: verify_user_set

- id: eval_audit_02
  capability: audit_user_access
  instruction: |
    Between 2026-04-22T00:00:00Z and 2026-04-24T00:00:00Z (Wednesday through
    Thursday only), list any users who successfully logged in from outside
    the EU and whose activity warrants investigation. Exclude users whose
    non-EU activity for this period is covered by a documented exception.

    Use the auth_logs index at http://localhost:9200.

    Return your answer as a JSON object via submit_attempt's `answer` field:

      {"users_to_investigate": ["<user.name>", ...]}
  verification:
    function: verify_user_set

- id: eval_lateral_01
  capability: detect_lateral_movement
  instruction: |
    Between 2026-04-20T00:00:00Z and 2026-04-27T00:00:00Z, identify any
    internal hosts whose connection pattern in the network index shows
    unusual fan-out to internal destinations they do not normally touch.
    Exclude documented infrastructure activity (scheduled backup, CI/CD
    nightly window).

    Use the network index at http://localhost:9200.

    Return a JSON list via submit_attempt's `answer` field. Each item:

      {
        "type": "lateral_movement",
        "primary_indicator": "<source internal hostname>",
        "evidence": "<one-sentence reason>"
      }
  verification:
    function: verify_incidents

- id: eval_dns_01
  capability: detect_dns_tunneling
  instruction: |
    Between 2026-04-20T00:00:00Z and 2026-04-27T00:00:00Z, identify any
    internal hosts whose DNS query pattern indicates tunneling (high volume
    to a single domain with random-looking subdomain labels).

    Use the dns index at http://localhost:9200.

    Return a JSON list via submit_attempt's `answer` field. Each item:

      {
        "type": "dns_tunneling",
        "primary_indicator": "<source internal hostname>",
        "evidence": "<one-sentence reason>"
      }
  verification:
    function: verify_incidents

- id: eval_compromise_01
  capability: investigate_compromised_account
