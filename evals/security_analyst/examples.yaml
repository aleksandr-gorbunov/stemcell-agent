- id: eval_incidents_01
  capability: detect_security_incidents
  instruction: |
    Review security activity between 2026-04-20T00:00:00Z and
    2026-04-22T00:00:00Z (Monday through Tuesday). Identify real security
    incidents present in that window across the auth_logs, network, and dns
    indices. Do not flag activity that matches a documented benign pattern.

    OpenSearch is at http://localhost:9200. Indices: auth_logs, network, dns.

    Return your answer as a JSON list via submit_attempt's `answer` field.
    Each item:

      {
        "type": "<credential_stuffing|data_exfiltration|lateral_movement|dns_tunneling|compromised_account|other>",
        "primary_indicator": "<IP, user, or internal hostname>",
        "evidence": "<one-sentence reason>"
      }

    Submit an empty list if no real incidents are present.
  verification:
    function: verify_incidents

- id: eval_incidents_02
  capability: detect_security_incidents
  instruction: |
    Review security activity between 2026-04-22T00:00:00Z and
    2026-04-24T00:00:00Z (Wednesday through Thursday). Identify real
    security incidents present in that window across auth_logs, network,
    and dns. Do not flag documented benign activity.

